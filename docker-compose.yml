services:
  cine:
    image: ghcr.io/3kaiu/cine:${CINE_IMAGE_TAG:-latest-core}
    container_name: cine
    pull_policy: always
    ports:
      - "${CINE_PORT:-3000}:3000"
    volumes:
      - ${CINE_DATA_DIR:-/vol1/docker/cine/data}:/app/data
      - ${CINE_MEDIA_DIR:-/vol1/media}:/media
    environment:
      PORT: "3000"
      DATABASE_URL: "sqlite:/app/data/media_toolbox.db"
      TMDB_API_KEY: "${TMDB_API_KEY}"
      RUST_LOG: "${RUST_LOG:-cine=info,axum=info}"
      CINE_MEDIA_DIRECTORIES: "${CINE_MEDIA_DIRECTORIES:-[\"/media\"]}"
      CINE_ENABLE_PLUGINS: "${CINE_ENABLE_PLUGINS:-false}"
      CINE_ENABLE_CACHE_WARMUP: "${CINE_ENABLE_CACHE_WARMUP:-false}"
      CINE_HASH_CACHE_DIR: "/app/data/hash_cache"
      CINE_TRASH_DIR: "/app/data/trash"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
