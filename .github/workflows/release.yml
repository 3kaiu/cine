name: Build and Release FPK

on:
  push:
    tags:
      - 'v*'  # 当推送以 v 开头的 tag 时触发
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build backend
        working-directory: ./backend
        run: cargo build --release

      - name: Get version for package
        id: package_version
        run: |
          VERSION=$(grep -m1 '^version' backend/Cargo.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Backend Executable
        uses: actions/upload-artifact@v4
        with:
          name: cine-backend-bin
          path: backend/target/release/cine-backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build

      - name: Upload Frontend Static Files
        uses: actions/upload-artifact@v4
        with:
          name: cine-frontend-dist
          path: frontend/dist/
          
      - name: Ensure Public Icon Exists
        run: touch frontend/public/icon.svg

      - name: Upload Frontend Icon
        uses: actions/upload-artifact@v4
        with:
          name: cine-frontend-icon
          path: frontend/public/icon.svg

  package-and-release:
    name: Package and Release
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Workspace
        run: |
          mkdir -p app/backend app/frontend config cmd

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: cine-backend-bin
          path: app/backend/

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: cine-frontend-dist
          path: app/frontend/
          
      - name: Download Frontend Icon
        uses: actions/download-artifact@v4
        with:
          name: cine-frontend-icon
          path: /tmp/icons/

      - name: Ensure Correct Backend Permissions
        run: chmod +x app/backend/cine-backend

      - name: Generate Config and Manifests
        run: |
          VERSION="${{ needs.build-backend.outputs.version }}"
          
          # 处理图标
          if [ -s "/tmp/icons/icon.svg" ]; then
             cp /tmp/icons/icon.svg ICON.PNG
             cp /tmp/icons/icon.svg ICON_256.PNG
          else
             touch ICON.PNG ICON_256.PNG
          fi
          
          # 创建配置文件
          cat > config/privilege <<EOF
          {
              "defaults": {
                  "run-as": "root"
              },
              "filesystem": {
                  "read": ["/"],
                  "write": ["/data/cine"]
              }
          }
          EOF
          
          mkdir -p app/config
          cat > app/config/config.json <<EOF
          {
              "port": 3000,
              "database_url": "sqlite:/data/cine.db",
              "hash_cache_dir": "/data/cine/hash_cache",
              "trash_dir": "/data/cine/trash"
          }
          EOF
          
          cat > manifest <<EOF
          {
              "app": "cine",
              "version": "$VERSION",
              "description": "Cine - 专为NAS用户打造的高性能影视文件管理工具",
              "main": "app/backend/cine-backend",
              "author": "Cine Team",
              "license": "MIT"
          }
          EOF

      - name: Install fnpack
        run: |
          FNPACK_URL="https://static2.fnnas.com/fnpack/fnpack-1.2.0-linux-amd64"
          echo "从 $FNPACK_URL 下载 fnpack..."
          
          if curl -L -o /tmp/fnpack "$FNPACK_URL"; then
            chmod +x /tmp/fnpack
            sudo mv /tmp/fnpack /usr/local/bin/fnpack
            if fnpack --version || true; then
              echo "✅ fnpack 安装成功"
              echo "FPK_BUILD=true" >> $GITHUB_ENV
            else
              echo "⚠️ fnpack 运行失败，回退到 tar.gz"
              echo "FPK_BUILD=false" >> $GITHUB_ENV
            fi
          else
            echo "❌ fnpack 下载失败，将创建 tar.gz 包"
            echo "FPK_BUILD=false" >> $GITHUB_ENV
          fi

      - name: Build FPK file
        id: build_fpk
        run: |
          VERSION="${{ needs.build-backend.outputs.version }}"
          
          if [ "${{ env.FPK_BUILD }}" = "true" ]; then
            fnpack build
            if [ -f "cine.fpk" ]; then
              mv cine.fpk cine-$VERSION.fpk
              echo "FPK_FILE=cine-$VERSION.fpk" >> $GITHUB_ENV
            else
              echo "FPK_BUILD=false" >> $GITHUB_ENV
            fi
          fi
          
          if [ "${{ env.FPK_BUILD }}" != "true" ]; then
            tar -czf cine-$VERSION.tar.gz app/ config/ cmd/ manifest ICON.PNG ICON_256.PNG
            echo "FPK_FILE=cine-$VERSION.tar.gz" >> $GITHUB_ENV
          fi
          
          cat > INSTALL.md <<EOF
          # Cine 安装说明
          
          ## 方式一：直接安装 fpk 文件（推荐）
          
          1. 下载 \`cine-$VERSION.fpk\` 文件
          2. 在飞牛OS管理界面中上传并安装
          
          ## 方式二：使用 tar.gz 包
          
          1. 下载并解压 \`cine-$VERSION.tar.gz\`
          2. 在解压后的目录中运行 \`fnpack build\` 生成 fpk 文件
          3. 在飞牛OS管理界面中上传并安装生成的 fpk 文件
          EOF

      - name: Get Tag Output
        id: get_version
        run: |
          VERSION="${{ needs.build-backend.outputs.version }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME="v$VERSION"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Delete existing release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ steps.get_version.outputs.tag }} --cleanup-tag --yes || true
          sleep 2

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Cine ${{ steps.get_version.outputs.version }}
            
            ### 📦 下载安装包
            
            - **FPK 文件**: `cine-${{ steps.get_version.outputs.version }}.fpk` - 可直接安装的 fpk 文件（如果可用）
            - **FPK 包**: `cine-${{ steps.get_version.outputs.version }}.tar.gz` - 包含完整应用文件的压缩包
            - **后端二进制**: `cine-backend-${{ steps.get_version.outputs.version }}-linux-x86_64` - 仅后端可执行文件
            - **安装说明**: `INSTALL.md` - 详细的安装指南
            
            ### 🚀 快速安装
            
            1. 下载 `cine-${{ steps.get_version.outputs.version }}.fpk` 文件（如果可用）
            2. 在飞牛OS管理界面中上传并安装
            
            如果没有 fpk 文件，请下载 tar.gz 包，解压后运行 \`fnpack build\` 生成 fpk 文件。
            
            ### 📝 变更内容
            
            查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 了解详细变更。
          files: |
            ${{ env.FPK_FILE }}
            INSTALL.md
            app/backend/cine-backend
          draft: false
          prerelease: false
